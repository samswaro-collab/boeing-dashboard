name: BEAKON Boeing Data Refresh

on:
  schedule:
    - cron: '0 6 */5 * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Write data_boeing.json
        run: python3 -c "import json,datetime; n=datetime.datetime.utcnow(); d=n.strftime('%Y-%m-%dT%H:%M:%SZ'); x=(n+datetime.timedelta(days=5)).strftime('%Y-%m-%dT%H:%M:%SZ'); open('data_boeing.json','w').write(json.dumps({'meta':{'lastRefreshed':d,'nextRefresh':x,'sources':'BEAKON baseline','generatedBy':'GitHub Actions'},'boeing':{'bca':{'total':921,'source':'baseline'},'bgs':{'total':50,'source':'baseline'},'bds':{'total':75,'source':'baseline'},'spirit':{'total':107,'source':'baseline'},'bietc':{'total':145,'source':'baseline'},'betc':{'total':30,'source':'baseline'},'wisk':{'total':52,'source':'baseline'},'avionx':{'total':10,'source':'baseline'},'aurora':{'total':60,'source':'baseline'},'insitu':{'total':50,'source':'baseline'},'totalRoles':1450}},indent=2))"

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-refresh Boeing hiring data [skip ci]"
          file_pattern: data_boeing.json
